name: Maintain Release PR

on:
  push:
    branches:
      - dev

jobs:
  maintain-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: true
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Ensure release PR exists
        id: ensure-release-pr
        run: |
          pr_url="$(gh pr list --base main --head dev --state open --json url --jq '.[0].url')"
          title="release: dev to main"
          body_file="$RUNNER_TEMP/release-pr-body.md"

          cat <<EOF > "$body_file"
          ## Summary
          - promote the current \`dev\` branch to \`main\`
          - keep the release PR in sync with the latest merge into \`dev\`

          ## Notes
          - created or updated automatically on push to \`dev\`
          - final merge to \`main\` remains human-controlled
          EOF

          if [[ -z "$pr_url" ]]; then
            pr_url="$(gh pr create --base main --head dev --title "$title" --body-file "$body_file")"
          else
            pr_number="$(gh pr view "$pr_url" --json number --jq '.number')"
            gh pr edit "$pr_number" --title "$title" --body-file "$body_file"
          fi

          echo "release_pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        run: |
          {
            echo "## Release PR"
            echo
            echo "URL: ${{ steps.ensure-release-pr.outputs.release_pr_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
