name: Validate Shared Ops

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  validate-shared-ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate shell scripts
        run: |
          find .claude/scripts .claude/templates -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done

      - name: Validate Python helpers
        run: |
          find .claude/templates -type f -name '*.py' -print0 | while IFS= read -r -d '' file; do
            python -m py_compile "$file"
          done

      - name: Validate JSON baselines
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path(".claude/settings.json"),
              Path(".mcp.json"),
              Path("package.template.json"),
          ]

          for path in paths:
              json.loads(path.read_text())
              print(path)
          PY

      - name: Validate tools guidance
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path(".guide/tools.md").read_text()

          required_lines = [
              r"^- code_navigation: Serena$",
              r"^- version_control: GitHub$",
              r"^- language: TypeScript `5\.9\.3`$",
              r"^- package_manager: bun `1\.3\.10`$",
              r"^- formatter: Prettier `\^3\.8\.1`$",
              r"^- linter: ESLint `\^10\.0\.3`$",
              r"^- typecheck: TypeScript `\^5\.9\.3`$",
              r"^- unit_test: Vitest `\^4\.0\.18`$",
              r"^- ui_test: Playwright `\^1\.58\.2`$",
              r"^- language: Python `3\.14\.3`$",
              r"^- package_manager: uv `0\.10\.9`$",
              r"^- formatter_and_linter: Ruff `0\.15\.5`$",
              r"^- typecheck: Pyright `1\.1\.408`$",
              r"^- test: pytest `9\.0\.2`$",
              r"^- deploy_cli: Wrangler `\^4\.72\.0`$",
          ]

          for pattern in required_lines:
              if not re.search(pattern, text, re.MULTILINE):
                  raise SystemExit(f"tools.md missing expected line: {pattern}")

          print(".guide/tools.md")
          PY

      - name: Validate YAML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [
              *Path(".github/workflows").glob("*.yml"),
              *Path(".claude/templates/cloudflare/pages").glob("*.yml"),
              *Path(".claude/templates/cloudflare/workers").glob("*.yml"),
              *Path(".claude/templates/electron").glob("*.yml"),
              *Path(".claude/templates/python").glob("*.yml"),
              Path(".claude/templates/cloudflare/release-pr.yml"),
          ]

          for path in paths:
              yaml.safe_load(path.read_text())
              print(path)
          PY

      - name: Validate skill and command mirrors
        run: |
          python - <<'PY'
          from pathlib import Path

          commands = {path.stem for path in Path(".claude/commands").glob("*.md")}
          skills = {
              path.parent.name
              for path in Path(".codex/skills").glob("*/SKILL.md")
              if path.parent.parent.name != ".system"
          }

          missing_commands = sorted(skills - commands)
          missing_skills = sorted(commands - skills)

          if missing_commands or missing_skills:
              raise SystemExit(
                  "command/skill mismatch: "
                  f"missing commands={missing_commands}, missing skills={missing_skills}"
              )
          PY

      - name: Validate tool version sync
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          package = json.loads(Path("package.template.json").read_text())
          tools = Path(".guide/tools.md").read_text()

          patterns = {
              "@playwright/test": r"^- ui_test: Playwright `([^`]+)`$",
              "eslint": r"^- linter: ESLint `([^`]+)`$",
              "prettier": r"^- formatter: Prettier `([^`]+)`$",
              "typescript": r"^- typecheck: TypeScript `([^`]+)`$",
              "vitest": r"^- unit_test: Vitest `([^`]+)`$",
          }

          expected = {}
          for name, pattern in patterns.items():
              match = re.search(pattern, tools, re.MULTILINE)
              if not match:
                  raise SystemExit(f"tools.md is missing {name}")
              expected[name] = match.group(1)

          actual = package["devDependencies"]

          missing = {
              name: version
              for name, version in expected.items()
              if actual.get(name) != version
          }

          if missing:
              raise SystemExit(f"package.template.json is out of sync: {missing}")
          PY

      - name: Validate tracked file formatting safety
        run: git diff --check
