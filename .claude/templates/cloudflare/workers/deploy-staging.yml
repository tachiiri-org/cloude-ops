name: Deploy Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    concurrency:
      group: deploy-staging-workers-${{ github.ref }}
      cancel-in-progress: true
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Deploy staging
        id: deploy
        run: |
          log_file="$RUNNER_TEMP/staging-deploy.log"
          bun run deploy:staging 2>&1 | tee "$log_file"
          staging_url="$(python3 - "$log_file" <<'PY'
          import re
          import sys
          from pathlib import Path

          text = Path(sys.argv[1]).read_text()
          matches = re.findall(r'https://[^\s)"]+', text)
          preferred = [url for url in matches if "workers.dev" in url or "pages.dev" in url]
          print((preferred or matches or [""])[0])
          PY
          )"

          if [[ -z "$staging_url" ]]; then
            echo "staging URL was not found in wrangler output" >&2
            exit 1
          fi

          echo "url=$staging_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Write workflow summary
        run: |
          {
            echo "## Cloudflare Staging"
            echo
            echo "Staging URL: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Find merged PR
        id: pr
        run: |
          pr_number="$(gh api repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls --jq '.[0].number' 2>/dev/null || true)"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Update PR comment
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_MARKER: "<!-- cloudflare-staging-url -->"
        run: |
          body_file="$RUNNER_TEMP/staging-comment.md"
          cat <<EOF > "$body_file"
          <!-- cloudflare-staging-url -->
          Staging deployment is ready after merge to \`dev\`.

          URL: ${{ steps.deploy.outputs.url }}
          EOF
          python3 scripts/github/upsert-pr-comment.py "$body_file"
