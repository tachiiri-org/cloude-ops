name: publish-electron

on:
  push:
    branches:
      - dev
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish-electron:
    name: publish-electron
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release channel metadata
        id: release
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "tag=update-stable" >> "$GITHUB_OUTPUT"
            echo "update_channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "tag=update-dev" >> "$GITHUB_OUTPUT"
            echo "update_channel=dev" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

          VERSION="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version);")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate channel build
        env:
          APP_CHANNEL: ${{ steps.release.outputs.channel }}
        run: bun run validate

      - name: Package updater artifacts
        env:
          APP_CHANNEL: ${{ steps.release.outputs.channel }}
          APP_UPDATE_CHANNEL: ${{ steps.release.outputs.update_channel }}
          APP_VERSION: ${{ steps.release.outputs.version }}
          APP_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: bun run build && bun run dist:linux

      - name: Verify updater metadata
        env:
          APP_CHANNEL: ${{ steps.release.outputs.channel }}
          APP_UPDATE_CHANNEL: ${{ steps.release.outputs.update_channel }}
          APP_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import { readFile } from 'node:fs/promises';
          import { resolve } from 'node:path';

          const metadataFile = `${process.env.APP_UPDATE_CHANNEL}-linux.yml`;
          const latestYaml = await readFile(resolve('dist', metadataFile), 'utf8');
          const urlMatch = latestYaml.match(/url:\s+(.+)/);
          const versionMatch = latestYaml.match(/version:\s+(.+)/);

          if (!versionMatch || versionMatch[1]?.trim() !== process.env.APP_VERSION) {
            throw new Error(`${metadataFile} version mismatch: ${versionMatch?.[1]}`);
          }

          if (!urlMatch) {
            throw new Error(`${metadataFile} does not include an artifact URL`);
          }

          if (!urlMatch[1]?.includes(process.env.APP_CHANNEL ?? '')) {
            throw new Error(`Artifact name does not include channel marker: ${urlMatch[1]}`);
          }
          EOF

      - name: Publish channel release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          APP_UPDATE_CHANNEL: ${{ steps.release.outputs.update_channel }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            if [ "${PRERELEASE}" = "true" ]; then
              gh release create "${TAG}" --title "${TAG}" --notes "" --prerelease --latest=false
            else
              gh release create "${TAG}" --title "${TAG}" --notes "" --latest=false
            fi
          fi

          files=(dist/*.AppImage "dist/${APP_UPDATE_CHANNEL}-linux.yml" dist/*.blockmap)
          gh release upload "${TAG}" "${files[@]}" --clobber

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          APP_CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          node --input-type=module <<'EOF'
          const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/releases/tags/${process.env.TAG}`, {
            headers: {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GH_TOKEN}`,
            },
          });

          if (!response.ok) {
            throw new Error(`Failed to read release assets: ${response.status}`);
          }

          const release = await response.json();
          const assetNames = new Set((release.assets ?? []).map((asset) => asset.name));
          const metadataName = `${process.env.APP_CHANNEL}-linux.yml`;

          if (!assetNames.has(metadataName)) {
            throw new Error(`Release is missing ${metadataName}`);
          }

          const hasAppImage = [...assetNames].some((name) => name.endsWith(`-${process.env.APP_CHANNEL}.AppImage`));

          if (!hasAppImage) {
            throw new Error(`Release is missing an AppImage for channel ${process.env.APP_CHANNEL}`);
          }
          EOF
