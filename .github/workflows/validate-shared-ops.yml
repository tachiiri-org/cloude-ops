name: Validate Shared Ops

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  validate-shared-ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate shell scripts
        run: |
          find .claude/templates -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done

      - name: Validate Python helpers
        run: |
          find .claude/templates -type f -name '*.py' ! -path '*/__pycache__/*' -print0 | while IFS= read -r -d '' file; do
            python -m py_compile "$file"
          done

      - name: Validate JSON baselines
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path(".claude/settings.json"),
              Path(".mcp.json"),
              Path("package.template.json"),
          ]

          for path in paths:
              json.loads(path.read_text())
              print(path)
          PY

      - name: Validate tools guidance
        run: |
          python - <<'PY'
          from pathlib import Path

          expected = {
              Path("project/.guide/languages/typescript.md"): "- TypeScript `^5.9.3`",
              Path("project/.guide/tools/bun.md"): "- Bun `1.3.10`",
              Path("project/.guide/tools/prettier.md"): "- Prettier `^3.8.1`",
              Path("project/.guide/tools/eslint.md"): "- ESLint `^10.0.3`",
              Path("project/.guide/tools/vitest.md"): "- Vitest `^4.0.18`",
              Path("project/.guide/tools/playwright.md"): "- Playwright `^1.58.2`",
              Path("project/.guide/languages/python.md"): "- Python `3.14.3`",
              Path("project/.guide/tools/uv.md"): "- uv `0.10.9`",
              Path("project/.guide/tools/ruff.md"): "- Ruff `0.15.5`",
              Path("project/.guide/tools/pyright.md"): "- Pyright `1.1.408`",
              Path("project/.guide/tools/pytest.md"): "- pytest `9.0.2`",
              Path("project/.guide/tools/wrangler.md"): "- Wrangler `^4.72.0`",
          }

          for path, expected_line in expected.items():
              text = path.read_text()
              if expected_line not in text:
                  raise SystemExit(f"{path} is missing expected line: {expected_line}")
              print(path)
          PY

      - name: Validate YAML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [
              *Path(".github/workflows").glob("*.yml"),
              *Path(".claude/templates/cloudflare/pages").glob("*.yml"),
              *Path(".claude/templates/cloudflare/workers").glob("*.yml"),
              *Path(".claude/templates/electron").glob("*.yml"),
              *Path(".claude/templates/python").glob("*.yml"),
              Path(".claude/templates/cloudflare/release-pr.yml"),
          ]

          for path in paths:
              yaml.safe_load(path.read_text())
              print(path)
          PY

      - name: Validate skill and command mirrors
        run: |
          python - <<'PY'
          from pathlib import Path

          commands = {path.stem for path in Path(".claude/commands").glob("*.md")}
          skills = {
              path.parent.name
              for path in Path(".codex/skills").glob("*/SKILL.md")
              if path.parent.parent.name != ".system"
          }

          missing_commands = sorted(skills - commands)
          missing_skills = sorted(commands - skills)

          if missing_commands or missing_skills:
              raise SystemExit(
                  "command/skill mismatch: "
                  f"missing commands={missing_commands}, missing skills={missing_skills}"
              )
          PY

      - name: Validate tool version sync
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path("package.template.json").read_text())
          expected = {
              "@playwright/test": (Path("project/.guide/tools/playwright.md"), "- Playwright `"),
              "eslint": (Path("project/.guide/tools/eslint.md"), "- ESLint `"),
              "prettier": (Path("project/.guide/tools/prettier.md"), "- Prettier `"),
              "typescript": (Path("project/.guide/languages/typescript.md"), "- TypeScript `"),
              "vitest": (Path("project/.guide/tools/vitest.md"), "- Vitest `"),
          }

          versions = {}
          for name, (path, prefix) in expected.items():
              for line in path.read_text().splitlines():
                  if line.startswith(prefix):
                      versions[name] = line.removeprefix(prefix).removesuffix("`")
                      break
              else:
                  raise SystemExit(f"{path} is missing {name}")

          actual = package["devDependencies"]

          missing = {
              name: version
              for name, version in versions.items()
              if actual.get(name) != version
          }

          if missing:
              raise SystemExit(f"package.template.json is out of sync: {missing}")
          PY

      - name: Validate tracked file formatting safety
        run: git diff --check
