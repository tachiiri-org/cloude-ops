name: Preview PR

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  preview-pr:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    concurrency:
      group: preview-pr-pages-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Detect optional scripts
        id: scripts
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          package = Path("package.json")
          scripts = {}
          if package.exists():
              scripts = json.loads(package.read_text()).get("scripts", {})

          for name in ("typecheck", "lint", "test", "build", "ui-check"):
              print(f"{name.replace('-', '_')}={'true' if name in scripts else 'false'}")
          PY

      - name: Typecheck
        if: steps.scripts.outputs.typecheck == 'true'
        run: bun run typecheck

      - name: Lint
        if: steps.scripts.outputs.lint == 'true'
        run: bun run lint

      - name: Test
        if: steps.scripts.outputs.test == 'true'
        run: bun run test

      - name: Build
        if: steps.scripts.outputs.build == 'true'
        run: bun run build

      - name: UI Check
        if: steps.scripts.outputs.ui_check == 'true'
        run: bun run ui-check

      - name: Deploy preview
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          log_file="$RUNNER_TEMP/preview-deploy.log"
          bun run deploy:preview 2>&1 | tee "$log_file"
          preview_url="$(python3 - "$log_file" <<'PY'
          import re
          import sys
          from pathlib import Path

          text = Path(sys.argv[1]).read_text()
          matches = re.findall(r'https://[^\s)"]+', text)
          preferred = [url for url in matches if "pages.dev" in url or "workers.dev" in url]
          print((preferred or matches or [""])[0])
          PY
          )"

          if [[ -z "$preview_url" ]]; then
            echo "preview URL was not found in wrangler output" >&2
            exit 1
          fi

          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        run: |
          {
            echo "## Cloudflare Preview"
            echo
            echo "Preview URL: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_MARKER: "<!-- cloudflare-preview-url -->"
        run: |
          body_file="$RUNNER_TEMP/preview-comment.md"
          cat <<EOF > "$body_file"
          <!-- cloudflare-preview-url -->
          Preview deployment is ready.

          URL: ${{ steps.deploy.outputs.url }}

          Auto-merge has been requested and will complete after all required checks pass.
          EOF
          python3 scripts/github/upsert-pr-comment.py "$body_file"

      - name: Enable auto-merge
        continue-on-error: true
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --merge
