name: Validate PR

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  validate-electron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Detect optional scripts
        id: scripts
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          package = Path("package.json")
          scripts = {}
          if package.exists():
              scripts = json.loads(package.read_text()).get("scripts", {})

          for name in ("typecheck", "lint", "test", "build", "ui-check"):
              print(f"{name.replace('-', '_')}={'true' if name in scripts else 'false'}")
          PY

      - name: Typecheck
        if: steps.scripts.outputs.typecheck == 'true'
        run: bun run typecheck

      - name: Lint
        if: steps.scripts.outputs.lint == 'true'
        run: bun run lint

      - name: Test
        if: steps.scripts.outputs.test == 'true'
        run: bun run test

      - name: Build
        if: steps.scripts.outputs.build == 'true'
        run: bun run build

      - name: UI Check
        if: steps.scripts.outputs.ui_check == 'true'
        run: bun run ui-check
